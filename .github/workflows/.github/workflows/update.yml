name: Update Naukri Profile

on:
  workflow_dispatch:
    inputs:
      headline_suffix:
        description: "Optional text to append in headline"
        required: false
        default: "Updated manually from GitHub Actions"
      dry_run:
        description: "Run login and navigation only"
        required: false
        default: "false"

jobs:
  update-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run updater
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          HEADLINE_SUFFIX: ${{ github.event.inputs.headline_suffix }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python script.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-debug
          path: artifacts/
          if-no-files-found: ignore
